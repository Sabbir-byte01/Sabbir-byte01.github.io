<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
  :root{
    --bg:#0b0e0d;
    --bg-alt:#121614;
    --fg:#d7e4dc;
    --dim:#6f8a7c;
    --accent:#ffb454;
    --accent-2:#5fd3c4;
    --danger:#ff6b6b;
    --border:#26302b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--fg);
    font-family:'JetBrains Mono','Fira Code',ui-monospace,Consolas,monospace;
    font-size:15px;line-height:1.6;min-height:100vh;
  }
  a{color:var(--accent-2);text-decoration:none;}
  a:hover{text-decoration:underline;}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px 80px;}

  .titlebar{
    display:flex;align-items:center;gap:8px;padding:10px 14px;
    background:var(--bg-alt);border:1px solid var(--border);border-radius:8px 8px 0 0;
  }
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.red{background:#ff5f56;} .dot.yellow{background:#ffbd2e;} .dot.green{background:#27c93f;}
  .titlebar span{margin-left:8px;color:var(--dim);font-size:13px;}

  .screen{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--bg);padding:24px 26px 8px;}

  .prompt{color:var(--accent);}
  .prompt .path{color:var(--accent-2);}
  .cursor{display:inline-block;width:8px;height:16px;background:var(--fg);animation:blink 1s steps(2) infinite;vertical-align:-2px;margin-left:4px;}
  @keyframes blink{50%{opacity:0;}}
  #typed-line{white-space:pre-wrap;}

  nav.cmds{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 10px;}
  nav.cmds button{
    background:none;border:1px solid var(--border);color:var(--fg);font-family:inherit;
    font-size:13px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.15s;
  }
  nav.cmds button:hover, nav.cmds button.active{border-color:var(--accent);color:var(--accent);}

  section{display:none;border-top:1px dashed var(--border);padding-top:18px;margin-top:14px;animation:fade .25s ease;}
  section.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  h1{font-size:1.5rem;margin:0 0 4px;color:var(--fg);}
  h2{font-size:.95rem;color:var(--accent);margin:0 0 14px;text-transform:uppercase;letter-spacing:.06em;}
  h2::before{content:"# ";color:var(--dim);}
  h3{font-size:1rem;margin:0 0 6px;color:var(--fg);}

  .tagline{color:var(--dim);margin:0 0 8px;}
  .quote{color:var(--accent-2);font-style:italic;margin:10px 0 18px;white-space:pre-line;}

  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;margin-bottom:16px;}
  .kv dt{color:var(--dim);}
  .kv dd{margin:0;}

  .tags{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 18px;}
  .tag{border:1px solid var(--border);color:var(--accent-2);padding:4px 10px;border-radius:5px;font-size:12.5px;}

  .skill-group{margin-bottom:14px;}
  .skill-group .label{color:var(--dim);font-size:13px;margin-bottom:6px;}

  .card{border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;background:var(--bg-alt);}
  .card p{margin:0 0 8px;color:var(--dim);}
  .card .links a{margin-right:14px;font-size:13px;}
  .card .meta-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;color:var(--dim);font-size:13px;}
  .card ul{margin:6px 0 0;padding-left:18px;color:var(--fg);}
  .card ul li{margin-bottom:4px;}

  .badge{display:inline-block;border:1px solid var(--accent);color:var(--accent);padding:3px 10px;border-radius:5px;font-size:12px;margin-right:8px;}
  .badge.alt{border-color:var(--accent-2);color:var(--accent-2);}

  .timeline{list-style:none;padding:0;margin:0 0 18px;}
  .timeline li{padding:8px 0;border-bottom:1px solid var(--border);}
  .timeline li:last-child{border-bottom:none;}
  .timeline .when{color:var(--dim);font-size:13px;}

  .module{margin-bottom:18px;}
  .module .module-title{color:var(--accent);font-size:14px;margin-bottom:10px;}
  .module .module-title .count{color:var(--dim);font-weight:normal;margin-left:6px;font-size:12px;}
  .topic{border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:var(--bg-alt);}
  .topic h4{margin:0 0 4px;font-size:14px;color:var(--fg);}
  .topic p{margin:0 0 6px;color:var(--dim);font-size:13.5px;}
  .topic a{font-size:13px;}

  .list-plain{list-style:none;padding:0;margin:0;}
  .list-plain li{padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .list-plain li:last-child{border-bottom:none;}
  .list-plain .meta{color:var(--dim);font-size:13px;}

  footer{margin-top:26px;padding-top:14px;border-top:1px dashed var(--border);color:var(--dim);font-size:13px;}
  ::selection{background:var(--accent);color:#000;}

  @media (max-width:520px){
    .kv{grid-template-columns:1fr;}
    .kv dt{color:var(--accent-2);}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="titlebar">
    <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    <span id="titlebar-text">visitor@portfolio: ~</span>
  </div>

  <div class="screen">
    <div>
      <span class="prompt">guest@portfolio<span class="path"> ~ </span>$</span>
      <span id="typed-line"></span><span class="cursor"></span>
    </div>

    <div id="whoami-block" style="margin-top:14px;"></div>

    <nav class="cmds" id="cmds"></nav>

    <section id="sec-about">
      <h2>about</h2>
      <div class="quote" id="about-quote"></div>
      <h1 id="about-name"></h1>
      <p class="tagline" id="about-tagline"></p>
      <p id="about-bio"></p>
      <dl class="kv" id="about-kv"></dl>
      <h3>Education</h3>
      <ul class="timeline" id="education-list"></ul>
    </section>

    <section id="sec-skills">
      <h2>skills</h2>
      <div id="skills-body"></div>
    </section>

    <section id="sec-experience">
      <h2>experience</h2>
      <div id="experience-body"></div>
    </section>

    <section id="sec-java">
      <h2 id="java-heading">core skill log</h2>
      <p class="tagline" id="java-tagline"></p>
      <div id="java-body"></div>
    </section>

    <section id="sec-ctf">
      <h2>ctf-log</h2>
      <p class="tagline" id="ctf-tagline"></p>
      <div id="ctf-body"></div>
    </section>

    <section id="sec-projects">
      <h2>projects</h2>
      <div id="projects-body"></div>
    </section>

    <section id="sec-contact">
      <h2>contact</h2>
      <p class="tagline" id="contact-tagline"></p>
      <dl class="kv" id="contact-kv"></dl>
    </section>

    <footer>
      <span id="footer-text"></span>
    </footer>
  </div>
</div>

<script>
/* ============================================================
   EDIT YOUR DATA HERE — everything in this DATA object is your
   own info. Change values, save, done. Leave any section's
   array empty ([]) to hide that section's content (nav still
   shows, block will just be empty) — or delete unused keys from
   SECTIONS below to remove a tab entirely.
   ============================================================ */

const DATA = {
  name: "Md. Sabbir Mohatab",
  tagline: "Aspiring Cloud Security Analyst",
  windowTitle: "sabbir@portfolio: ~",
  typedCommand: "whoami",

  whoami: {
    line1: "Md. Sabbir Mohatab — Cybersecurity Learner, Offensive Security Focus",
    focusLabel: "cat focus.txt",
    focus: "Offensive security · CTF · Cloud security",
    locationLabel: "location --show",
    location: "Jashore, Bangladesh",
    status: "seeking entry-level cybersecurity / cloud security role",
    quote: "Learning to break things carefully,\nso I can help secure them properly."
  },

  about: {
    bio: "I am Sabbir Mohatab, currently learning cybersecurity with a strong focus on offensive security. I regularly participate in Capture The Flag (CTF) competitions and enjoy applying different techniques. My goal is to build a successful career as a cloud security analyst, continuously enhancing my practical skills and knowledge.",
    details: {
      "University": "Mawlana Bhasani Science and Technology University",
      "Department": "Information and Communication Technology",
      "Degree": "BSc. (Engg.) — Present (2024)",
      "Languages": "Bangla · English",
      "Handle": "manchineel"
    },
    education: [
      { when: "2024 – Present", title: "BSc. (Engg.) in Information and Communication Technology", org: "Mawlana Bhasani Science and Technology University · Tangail" },
      { when: "— 2022", title: "Higher Secondary Certificate", org: "Jashore Shikkha Board GOVT. Model School and College · Jashore" }
    ]
  },

  skills: [
    { label: "Technical Skills", items: ["Linux Basics", "Networking Fundamentals", "Cybersecurity Fundamentals"] },
    { label: "Programming & Scripting", items: ["C", "C++", "Python"] },
    { label: "Offensive Tools", items: ["Nmap", "Gobuster / FFUF / Dirbuster", "Metasploit", "Wireshark", "Hydra", "LinPEAS", "PSPY64", "Enum4Linux", "JohnTheRipper / Hashcat", "WPScan"] }
  ],

  experience: [
    {
      title: "Cybersecurity Trainee",
      org: "H4K2LIV3",
      bullets: [
        "Completed 50+ labs on TryHackMe and VulnHub simulating real-world attacks."
      ]
    }
  ],

  java: {
    heading: "core skill log",
    tagline: "A self-paced module log covering a language/skill from the ground up — each topic can link to where you learned it.",
    modules: [
      {
        title: "Foundations",
        topics: [
          { title: "Topic Name", description: "One-line description of what this covers.", link: "" },
          { title: "Another Topic", description: "One-line description.", link: "" }
        ]
      },
      {
        title: "Core Concepts",
        topics: [
          { title: "Topic Name", description: "One-line description.", link: "" }
        ]
      }
    ]
  },

  ctf: {
    tagline: "Competing under the handle your-handle, usually with team Your Team.",
    entries: [
      {
        name: "Competition Name YYYY",
        result: "Rank #N",
        description: "Organizer / details about the event.",
        stats: ["N pts", "Team: Your Team"],
        certLink: ""
      }
    ]
  },

  projects: [
    {
      title: "MBSTU Student Management System",
      description: "A student management system built with C to manage and organize student records and information.",
      tags: ["C"],
      links: [{ label: "GitHub", url: "https://github.com/Sabbir-byte01" }]
    }
  ],

  contact: {
    tagline: "Open to entry-level cybersecurity and cloud security roles — let's talk.",
    fields: {
      "Email": "sabbir107031@gmail.com",
      "Phone": "+880 1936 400464",
      "Location": "Jashore, Bangladesh",
      "GitHub": "github.com/Sabbir-byte01",
      "LinkedIn": "linkedin.com/in/md-sabbir-mohatab-564416340"
    }
  },

  footerText: "© 2026 Md. Sabbir Mohatab"
};

/* ============================================================
   DO NOT EDIT BELOW — rendering logic
   ============================================================ */

const SECTIONS = ["about","skills","experience","java","ctf","projects","contact"];
const SECTION_LABELS = { about:"about", skills:"skills", experience:"experience", java:"java", ctf:"ctf-log", projects:"projects", contact:"contact" };

document.getElementById("titlebar-text").textContent = DATA.windowTitle;
document.getElementById("footer-text").textContent = DATA.footerText;

// whoami block
const w = DATA.whoami;
document.getElementById("whoami-block").innerHTML = `
  <div style="margin-bottom:6px;"><span class="prompt">guest@portfolio<span class="path"> ~ </span>$</span> whoami</div>
  <div style="color:var(--dim);margin-bottom:14px;">${w.line1}</div>
  <div style="margin-bottom:6px;"><span class="prompt">guest@portfolio<span class="path"> ~ </span>$</span> ${w.focusLabel}</div>
  <div style="color:var(--dim);margin-bottom:14px;">${w.focus}</div>
  <div style="margin-bottom:6px;"><span class="prompt">guest@portfolio<span class="path"> ~ </span>$</span> ${w.locationLabel}</div>
  <div style="color:var(--dim);margin-bottom:14px;">${w.location}</div>
  <div style="color:var(--accent);font-size:13px;">STATUS: ${w.status}</div>
`;

// about
document.getElementById("about-quote").textContent = w.quote;
document.getElementById("about-name").textContent = DATA.name;
document.getElementById("about-tagline").textContent = DATA.tagline;
document.getElementById("about-bio").textContent = DATA.about.bio;
const aboutKv = document.getElementById("about-kv");
Object.entries(DATA.about.details).forEach(([k,v])=>{
  aboutKv.insertAdjacentHTML("beforeend", `<dt>${k}</dt><dd>${v}</dd>`);
});
const eduList = document.getElementById("education-list");
DATA.about.education.forEach(e=>{
  eduList.insertAdjacentHTML("beforeend",
    `<li><div class="when">${e.when}</div><div>${e.title}</div><div style="color:var(--dim);font-size:13px;">${e.org}</div></li>`);
});

// skills
const skillsBody = document.getElementById("skills-body");
DATA.skills.forEach(group=>{
  const tags = group.items.map(i=>`<span class="tag">${i}</span>`).join("");
  skillsBody.insertAdjacentHTML("beforeend",
    `<div class="skill-group"><div class="label">${group.label}</div><div class="tags">${tags}</div></div>`);
});

// experience
const expBody = document.getElementById("experience-body");
DATA.experience.forEach(e=>{
  const bullets = e.bullets.map(b=>`<li>${b}</li>`).join("");
  expBody.insertAdjacentHTML("beforeend",
    `<div class="card"><h3>${e.title}</h3><p>${e.org}</p><ul>${bullets}</ul></div>`);
});

// java / skill log
document.getElementById("java-heading").textContent = DATA.java.heading || "core skill log";
document.getElementById("java-tagline").textContent = DATA.java.tagline;
const javaBody = document.getElementById("java-body");
DATA.java.modules.forEach((m,idx)=>{
  const num = String(idx+1).padStart(2,"0");
  const topics = m.topics.map(t=>`
    <div class="topic">
      <h4>${t.title}</h4>
      <p>${t.description}</p>
      ${t.link ? `<a href="${t.link}" target="_blank" rel="noopener">▶ Watch</a>` : ""}
    </div>`).join("");
  javaBody.insertAdjacentHTML("beforeend", `
    <div class="module">
      <div class="module-title">${num} — ${m.title}<span class="count">${m.topics.length} topics</span></div>
      ${topics}
    </div>`);
});

// ctf
document.getElementById("ctf-tagline").textContent = DATA.ctf.tagline;
const ctfBody = document.getElementById("ctf-body");
DATA.ctf.entries.forEach(c=>{
  const stats = c.stats.map(s=>`<span class="badge">${s}</span>`).join("");
  ctfBody.insertAdjacentHTML("beforeend", `
    <div class="card">
      <div class="meta-row"><h3 style="margin:0;">${c.name}</h3><span class="badge alt">${c.result}</span></div>
      <p>${c.description}</p>
      <div style="margin:8px 0;">${stats}</div>
      ${c.certLink ? `<div class="links"><a href="${c.certLink}" target="_blank" rel="noopener">View certificate →</a></div>` : ""}
    </div>`);
});

// projects
const projectsBody = document.getElementById("projects-body");
DATA.projects.forEach(p=>{
  const links = (p.links||[]).map(l=>`<a href="${l.url}" target="_blank" rel="noopener">${l.label} →</a>`).join("");
  const tags = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
  projectsBody.insertAdjacentHTML("beforeend",
    `<div class="card"><h3>${p.title}</h3><p>${p.description}</p><div class="tags">${tags}</div><div class="links">${links}</div></div>`);
});

// contact
document.getElementById("contact-tagline").textContent = DATA.contact.tagline;
const contactKv = document.getElementById("contact-kv");
Object.entries(DATA.contact.fields).forEach(([k,v])=>{
  const isEmail = v.includes("@");
  const href = isEmail ? `mailto:${v}` : null;
  contactKv.insertAdjacentHTML("beforeend",
    `<dt>${k}</dt><dd>${href ? `<a href="${href}">${v}</a>` : v}</dd>`);
});

// nav buttons
const cmds = document.getElementById("cmds");
SECTIONS.forEach((id,i)=>{
  const btn = document.createElement("button");
  btn.textContent = SECTION_LABELS[id];
  btn.dataset.target = id;
  if(i===0) btn.classList.add("active");
  btn.addEventListener("click", ()=> showSection(id));
  cmds.appendChild(btn);
});

function showSection(id){
  SECTIONS.forEach(s=>{
    document.getElementById("sec-"+s).classList.toggle("active", s===id);
  });
  document.querySelectorAll("#cmds button").forEach(b=>{
    b.classList.toggle("active", b.dataset.target===id);
  });
}
showSection("about");

// typing effect
const typedEl = document.getElementById("typed-line");
const text = DATA.typedCommand;
let i = 0;
function typeChar(){
  if(i <= text.length){
    typedEl.textContent = text.slice(0,i);
    i++;
    setTimeout(typeChar, 80);
  }
}
typeChar();
</script>
</body>
</html>
